name: Continuous Integration

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'docs/**'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
    # 1. Inizializzazione Ambiente
    - name: Checkout del codice
      uses: actions/checkout@v5

    - name: Configurazione Node.js
      uses: actions/setup-node@v5
      with:
        node-version: 22 
        cache: 'npm'

    - name: Installazione Dipendenze
      run: npm ci

    # 2. Primo Cancello: LINTING (QA Statico)
    - name: Esecuzione Linting
      run: npm run lint

    # 3. Secondo Cancello: SECURITY AUDIT (Sec)
    - name: Controllo Vulnerabilità Dipendenze
      run: npm audit --audit-level=high

    # 4. Terzo Cancello: TESTING (Logica di Business)
    - name: Esecuzione Suite di Test
      run: npm run test:run

# 🚀 STEP 7: DEPLOYMENT AUTOMATICO (Attivo solo se i 3 cancelli sopra sono VERDI)
    - name: Configura ambiente GitHub Pages
      uses: actions/configure-pages@v5

    - name: Carica l'artefatto della cartella src
      uses: actions/upload-pages-artifact@v3
      with:
        # Ordiniamo al server di prendere ESCLUSIVAMENTE la cartella src
        path: './src'

    - name: Pubblica su GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4      