name: Pipeline di CI/CD e Sicurezza

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'                # Ignora qualsiasi file Markdown nel repository
      - 'docs/**'              # Ignora qualsiasi file dentro una eventuale cartella docs
  pull_request:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'docs/**'

jobs:
  # 🧪 JOB 1: Continuous Integration (Verifica e Test)
  test-and-lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22, 24] # Gira in parallelo su entrambi i motori

    steps:
      - name: Checkout del codice
        uses: actions/checkout@v6

      - name: Configurazione Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Installazione Dipendenze
        run: npm ci

      - name: Cancello 1 - Controllo Sintattico (Lint)
        run: npm run lint

      - name: Cancello 2 - Controllo Vulnerabilità (Audit)
        run: npm audit --audit-level=high

      - name: Cancello 3 - Test Unitari (Vitest)
        run: npm run test:run

 # 🛡️ JOB 2: Sicurezza Statica (Semgrep)
  semgrep-sast:
    runs-on: ubuntu-latest
    container:
      image: returntocorp/semgrep
    steps:
      - name: Checkout del codice
        uses: actions/checkout@v6
      - name: Run Semgrep CLI
        run: semgrep scan --config=p/default --config=p/javascript --error


 # 🚀 JOB 3: Continuous Deployment (Rilascio su Pages)
  deploy:
    runs-on: ubuntu-latest
    needs: [test-and-lint, semgrep-sast] # ⚠️ CRITICO: Ora attende che ENTRAMBI siano verdi
    if: github.event_name == 'push'      # ✨ Esegue il deploy SOLO se è un push (esclude le Pull Request)
    
    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout del codice
        uses: actions/checkout@v6

      - name: Configurazione Node.js (Fissa sulla nostra produzione)
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'

      - name: Configurazione Ambiente Pages
        uses: actions/configure-pages@v6

      - name: Caricamento Artefatto Web
        uses: actions/upload-pages-artifact@v5
        with:
          path: './src'

      - name: Rilascio su GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5