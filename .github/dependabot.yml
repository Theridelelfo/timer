# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
version: 2
updates:
  # 📦 1. MONITORAGGIO DELLE DIPENDENZE NPM (Il motore del Timer)
  - package-ecosystem: "npm"
    directory: "/" # Cerca il package.json nella root del progetto
    schedule:
      interval: "weekly" # Controlla gli aggiornamenti una volta alla settimana
    open-pull-requests-limit: 5 # Non aprire più di 5 PR contemporaneamente per non intasarti

  # 🛰️ 2. MONITORAGGIO DELLE GITHUB ACTIONS (I motori della Pipeline)
  - package-ecosystem: "github-actions"
    directory: "/" # Cerca i file .yml dentro .github/workflows/
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
